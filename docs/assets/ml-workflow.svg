<svg xmlns="http://www.w3.org/2000/svg" width="980" height="310" viewBox="0 0 980 310" role="img" aria-labelledby="title desc">
<title id="title">Shared Machine Learning Workflow</title>
<desc id="desc">Common workflow used across the three notebooks</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="40" y="46" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2933">Shared Machine Learning Workflow</text>
<text x="40" y="73" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#52616b">Common workflow used across the three notebooks</text>
<rect x="40" y="130" width="160" height="82" rx="8" fill="#edf6f9" stroke="#315f72" stroke-width="1.5"/>
<text x="120.0" y="160" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2933">Data Cleaning</text>
<text x="120.0" y="183" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#52616b">missing values</text>
<text x="120.0" y="198" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#52616b">duplicates, outliers</text>
