<text x="310.0" y="183" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#52616b">encoding</text>
<text x="310.0" y="198" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#52616b">scaling, feature setup</text>
<line x1="395" y1="171.0" x2="408" y2="171.0" stroke="#334155" stroke-width="1.5"/>
<path d="M 408 165.0 L 420 171.0 L 408 177.0 Z" fill="#334155"/>
