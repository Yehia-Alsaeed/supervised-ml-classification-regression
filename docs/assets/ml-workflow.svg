<text x="500.0" y="160" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2933">Model Training</text>
<text x="500.0" y="183" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#52616b">classification and regression models</text>
<text x="500.0" y="198" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#52616b"></text>
<line x1="585" y1="171.0" x2="598" y2="171.0" stroke="#334155" stroke-width="1.5"/>
<path d="M 598 165.0 L 610 171.0 L 598 177.0 Z" fill="#334155"/>
