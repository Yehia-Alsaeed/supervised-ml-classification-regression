<text x="690.0" y="160" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2933">Tuning</text>
<text x="690.0" y="183" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#52616b">GridSearchCV and feature selection</text>
<text x="690.0" y="198" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#52616b"></text>
<line x1="775" y1="171.0" x2="788" y2="171.0" stroke="#334155" stroke-width="1.5"/>
